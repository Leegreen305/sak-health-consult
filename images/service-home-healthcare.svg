<svg xmlns="http://www.w3.org/2000/svg" width="600" height="500" viewBox="0 0 600 500">
  <defs>
    <linearGradient id="hcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F2F3;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="500" fill="url(#hcGrad)"/>
  <!-- House -->
  <path d="M 100 200 L 300 80 L 500 200 L 500 420 L 100 420 Z" fill="#E8F4F8" stroke="#0A5C61" stroke-width="3"/>
  <!-- Roof -->
  <path d="M 100 200 L 300 60 L 500 200" fill="none" stroke="#0A5C61" stroke-width="3"/>
  <!-- Door -->
  <rect x="250" y="300" width="100" height="120" rx="8" fill="#B8943F" opacity="0.8"/>
  <circle cx="340" cy="360" r="6" fill="#FFFFFF"/>
  <!-- Window 1 -->
  <rect x="140" y="240" width="80" height="80" rx="4" fill="#87CEEB" opacity="0.6"/>
  <line x1="180" y1="240" x2="180" y2="320" stroke="#0A5C61" stroke-width="1"/>
  <line x1="140" y1="280" x2="220" y2="280" stroke="#0A5C61" stroke-width="1"/>
  <!-- Window 2 -->
  <rect x="380" y="240" width="80" height="80" rx="4" fill="#87CEEB" opacity="0.6"/>
  <line x1="420" y1="240" x2="420" y2="320" stroke="#0A5C61" stroke-width="1"/>
  <line x1="380" y1="280" x2="460" y2="280" stroke="#0A5C61" stroke-width="1"/>
  <!-- Healthcare worker at door -->
  <g transform="translate(320, 220)">
    <circle cx="0" cy="0" r="16" fill="#F5D5B8"/>
    <rect x="-12" y="16" width="24" height="28" fill="#FFFFFF" stroke="#E2EAEB" stroke-width="1"/>
    <line x1="-12" y1="20" x2="-26" y2="35" stroke="#F5D5B8" stroke-width="4" stroke-linecap="round"/>
    <line x1="12" y1="20" x2="26" y2="30" stroke="#F5D5B8" stroke-width="4" stroke-linecap="round"/>
    <!-- Medical bag -->
    <rect x="24" y="18" width="20" height="24" rx="2" fill="#C0392B" opacity="0.9"/>
  </g>
  <!-- Heart accent -->
  <path d="M 480 100 Q 490 90 500 100 Q 510 110 500 120 Q 490 110 480 100" fill="#C0392B" opacity="0.7"/>
</svg>