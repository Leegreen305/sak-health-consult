<svg xmlns="http://www.w3.org/2000/svg" width="600" height="500" viewBox="0 0 600 500">
  <defs>
    <linearGradient id="logGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F4F4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="500" fill="url(#logGrad)"/>
  <!-- Truck -->
  <g transform="translate(80, 220)">
    <!-- Truck body -->
    <rect x="0" y="40" width="280" height="100" rx="8" fill="#0A5C61" stroke="#12898F" stroke-width="2"/>
    <!-- Cabin -->
    <rect x="280" y="40" width="80" height="80" rx="4" fill="#12898F" stroke="#0A5C61" stroke-width="2"/>
    <!-- Window -->
    <rect x="290" y="50" width="60" height="40" rx="2" fill="#87CEEB" opacity="0.7"/>
    <!-- Wheels -->
    <circle cx="60" cy="150" r="20" fill="#2C3E50"/>
    <circle cx="60" cy="150" r="14" fill="#4A6366"/>
    <circle cx="280" cy="150" r="20" fill="#2C3E50"/>
    <circle cx="280" cy="150" r="14" fill="#4A6366"/>
    <circle cx="330" cy="150" r="18" fill="#2C3E50"/>
    <circle cx="330" cy="150" r="12" fill="#4A6366"/>
    <!-- Medical cross on side -->
    <rect x="100" y="70" width="30" height="50" fill="#C0392B" opacity="0.85"/>
    <rect x="110" y="80" width="10" height="30" fill="#FFFFFF"/>
    <rect x="105" y="85" width="20" height="10" fill="#FFFFFF"/>
  </g>
  <!-- Delivery items floating -->
  <g transform="translate(420, 160)">
    <!-- Box 1 -->
    <rect x="0" y="0" width="60" height="60" rx="4" fill="#B8943F" opacity="0.85" stroke="#0A5C61" stroke-width="2"/>
    <text x="30" y="35" font-family="Inter, sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle" font-weight="700">+</text>
    <!-- Box 2 -->
    <rect x="50" y="30" width="50" height="50" rx="4" fill="#2D7A5F" opacity="0.85" stroke="#0A5C61" stroke-width="2"/>
    <circle cx="75" cy="55" r="6" fill="#B8943F"/>
  </g>
  <!-- Arrow showing delivery path -->
  <path d="M 380 240 L 440 240" stroke="#B8943F" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#B8943F"/>
    </marker>
  </defs>
</svg>