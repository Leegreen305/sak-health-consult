<svg xmlns="http://www.w3.org/2000/svg" width="600" height="500" viewBox="0 0 600 500">
  <defs>
    <linearGradient id="eduGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F4F4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FAFAFA;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="500" fill="url(#eduGrad)"/>
  <!-- Presentation board -->
  <rect x="80" y="100" width="240" height="200" rx="8" fill="#FFFFFF" stroke="#0A5C61" stroke-width="3"/>
  <!-- Chart elements -->
  <rect x="110" y="130" width="40" height="80" rx="2" fill="#0A5C61" opacity="0.8"/>
  <rect x="160" y="110" width="40" height="100" rx="2" fill="#12898F" opacity="0.8"/>
  <rect x="210" y="140" width="40" height="70" rx="2" fill="#B8943F" opacity="0.8"/>
  <!-- Axis lines -->
  <line x1="100" y1="220" x2="300" y2="220" stroke="#E2EAEB" stroke-width="2"/>
  <line x1="100" y1="130" x2="100" y2="220" stroke="#E2EAEB" stroke-width="2"/>
  <!-- Instructor -->
  <g transform="translate(420, 180)">
    <!-- Head -->
    <circle cx="0" cy="0" r="20" fill="#F5D5B8"/>
    <!-- Body -->
    <rect x="-15" y="20" width="30" height="40" rx="4" fill="#0A5C61" opacity="0.85"/>
    <!-- Arms -->
    <line x1="-15" y1="30" x2="-35" y2="50" stroke="#F5D5B8" stroke-width="5" stroke-linecap="round"/>
    <line x1="15" y1="30" x2="35" y2="50" stroke="#F5D5B8" stroke-width="5" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="-8" y1="60" x2="-8" y2="90" stroke="#4A4A4A" stroke-width="4" stroke-linecap="round"/>
    <line x1="8" y1="60" x2="8" y2="90" stroke="#4A4A4A" stroke-width="4" stroke-linecap="round"/>
    <!-- Pointer -->
    <line x1="-35" y1="50" x2="80" y2="20" stroke="#B8943F" stroke-width="2"/>
  </g>
  <!-- Attendees -->
  <g transform="translate(420, 300)">
    <circle cx="0" cy="0" r="12" fill="#F5D5B8"/>
    <circle cx="35" cy="10" r="12" fill="#F5D5B8"/>
    <circle cx="-30" cy="15" r="12" fill="#F5D5B8"/>
  </g>
  <!-- Health icon -->
  <circle cx="150" cy="420" r="35" fill="#2D7A5F" opacity="0.8"/>
  <text x="150" y="435" font-family="Arial, sans-serif" font-size="40" fill="#FFFFFF" text-anchor="middle" font-weight="700">+</text>
</svg>